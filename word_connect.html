<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Swipe Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
            overscroll-behavior: none; /* Prevents pull-to-refresh on mobile */
            -webkit-tap-highlight-color: transparent;
        }

        /* Prevent scrolling when touching the game board */
        .touch-none {
            touch-action: none;
        }

        .letter-node {
            transition: transform 0.1s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        }

        .letter-node.active {
            transform: scale(1.15);
            background-color: #14b8a6; /* teal-500 */
            color: white;
            border-color: #0d9488; /* teal-600 */
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.6);
        }

        .word-cell {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        .word-cell.found {
            background-color: #f59e0b; /* amber-500 */
            color: white;
            border-color: #d97706; /* amber-600 */
            transform: scale(1.05);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .word-cell.hint {
            color: #f59e0b;
            font-weight: bold;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes popOut {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popOut 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Toast Message */
        #toast {
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 50;
        }

        /* Modal */
        #levelCompleteModal {
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="flex justify-between items-center p-4 bg-slate-800 shadow-md z-10">
        <div class="flex items-center gap-2">
            <div class="bg-amber-500 w-8 h-8 rounded-full flex justify-center items-center font-bold text-slate-900 shadow-inner">
                <i class="fa-solid fa-coins text-sm"></i>
            </div>
            <span id="coinsDisplay" class="font-bold text-lg">100</span>
        </div>
        <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-amber-400">WORD SWIPE</h1>
        <div class="font-bold text-slate-300 bg-slate-700 px-3 py-1 rounded-full text-sm">
            Level <span id="levelDisplay">1</span>
        </div>
    </header>

    <!-- Game Area -->
    <main class="flex-1 flex flex-col relative w-full max-w-lg mx-auto">
        
        <!-- Board (Words to find) -->
        <div id="boardArea" class="flex-1 p-4 flex flex-col justify-center items-center gap-3 overflow-y-auto w-full">
            <!-- Words injected here via JS -->
        </div>

        <!-- Interaction Area (Letters Circle) -->
        <div class="p-4 relative w-full flex-shrink-0 flex flex-col items-center justify-end pb-8">
            
            <!-- Current Word Preview floating above circle -->
            <div id="currentWordPreview" class="h-10 text-2xl font-black tracking-widest text-teal-400 opacity-0 transition-opacity duration-200 mb-2">
                TEST
            </div>

            <div id="interactionContainer" class="relative w-full max-w-[280px] sm:max-w-[320px] aspect-square touch-none bg-slate-800 rounded-full shadow-2xl border border-slate-700">
                <!-- Canvas for drawing lines -->
                <canvas id="lineCanvas" class="absolute inset-0 w-full h-full pointer-events-none rounded-full"></canvas>
                <!-- Letters injected here via JS -->
            </div>

            <!-- Controls -->
            <div class="flex justify-between w-full max-w-[280px] sm:max-w-[320px] mt-6 px-4">
                <button id="shuffleBtn" class="bg-slate-700 hover:bg-slate-600 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg transition-transform active:scale-95">
                    <i class="fa-solid fa-shuffle"></i>
                </button>
                <button id="hintBtn" class="bg-teal-600 hover:bg-teal-500 text-white rounded-full px-6 h-12 flex items-center justify-center shadow-lg transition-transform active:scale-95 font-bold gap-2">
                    <i class="fa-solid fa-lightbulb text-amber-300"></i> Hint (-25)
                </button>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast">Already Found!</div>

    <!-- Level Complete Modal -->
    <div id="levelCompleteModal" class="fixed inset-0 bg-black/60 hidden flex-col items-center justify-center z-50 px-4">
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full border border-slate-700 animate-pop">
            <h2 class="text-3xl font-black text-amber-400 mb-2">Level Cleared!</h2>
            <p class="text-slate-300 mb-6">Great job expanding your vocabulary.</p>
            
            <div class="flex justify-center items-center gap-2 mb-8 bg-slate-700 p-3 rounded-xl">
                <i class="fa-solid fa-coins text-amber-500 text-xl"></i>
                <span class="text-xl font-bold">+20 Coins</span>
            </div>

            <button id="nextLevelBtn" class="w-full bg-gradient-to-r from-teal-500 to-teal-400 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-teal-500/30 transition-all active:scale-95 text-lg">
                Next Level
            </button>
        </div>
    </div>

    <!-- Celebration Canvas -->
    <canvas id="confettiCanvas" class="fixed inset-0 w-full h-full pointer-events-none z-40 hidden"></canvas>

    <script>
        // --- GAME DATA ---
        const levels = [
            { letters: ['A', 'T', 'E'], words: ['ATE', 'EAT', 'TEA'] },
            { letters: ['P', 'O', 'S', 'T'], words: ['POST', 'POT', 'TOP', 'STOP', 'SPOT', 'POTS'] },
            { letters: ['B', 'R', 'A', 'I', 'N'], words: ['BRAIN', 'RAIN', 'BRAN', 'BAR', 'AIR', 'RIB'] },
            { letters: ['M', 'A', 'G', 'I', 'C'], words: ['MAGIC', 'MAC', 'CAM', 'AIM'] },
            { letters: ['P', 'U', 'Z', 'Z', 'L', 'E'], words: ['PUZZLE', 'PULL', 'UP'] },
            { letters: ['S', 'P', 'R', 'I', 'N', 'G'], words: ['SPRING', 'RING', 'SING', 'PIG', 'SPIN', 'RIP'] },
            { letters: ['W', 'O', 'N', 'D', 'E', 'R'], words: ['WONDER', 'OWNER', 'DOWN', 'WORD', 'RED', 'NOD'] }
        ];

        // --- STATE ---
        let currentLevelIndex = 0;
        let coins = 100;
        let foundWords = [];
        let hintsRevealed = []; // Tracks which specific letter indices in which words are revealed
        
        let letterNodes = []; // DOM elements for the circle
        let letterPositions = []; // {x, y, char, id}
        let selectedIndices = []; // Indices of currently swiped letters
        let isDragging = false;
        let currentTouchPos = { x: 0, y: 0 };

        // --- DOM ELEMENTS ---
        const boardArea = document.getElementById('boardArea');
        const interactionContainer = document.getElementById('interactionContainer');
        const lineCanvas = document.getElementById('lineCanvas');
        const ctx = lineCanvas.getContext('2d');
        const currentWordPreview = document.getElementById('currentWordPreview');
        const toastEl = document.getElementById('toast');
        const levelDisplay = document.getElementById('levelDisplay');
        const coinsDisplay = document.getElementById('coinsDisplay');
        const levelCompleteModal = document.getElementById('levelCompleteModal');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const hintBtn = document.getElementById('hintBtn');

        // --- INITIALIZATION ---
        function initGame() {
            // Load from localStorage if available
            const savedState = localStorage.getItem('wordSwipeState');
            if (savedState) {
                const state = JSON.parse(savedState);
                currentLevelIndex = state.level % levels.length;
                coins = state.coins;
            }
            updateCoins(0);
            loadLevel(currentLevelIndex);
            
            // Resize handler for canvas and letter positioning
            window.addEventListener('resize', handleResize);
        }

        function saveState() {
            localStorage.setItem('wordSwipeState', JSON.stringify({
                level: currentLevelIndex,
                coins: coins
            }));
        }

        function loadLevel(index) {
            const level = levels[index % levels.length];
            levelDisplay.textContent = index + 1;
            foundWords = [];
            hintsRevealed = {}; // { "WORD": [0, 2] } meaning letters at index 0 and 2 are revealed
            
            // Sort words by length, then alphabetically for nice board layout
            level.words.sort((a, b) => {
                if (a.length !== b.length) return a.length - b.length;
                return a.localeCompare(b);
            });

            renderBoard(level.words);
            renderLetters(level.letters);
            handleResize(); // Sets up canvas and positions
        }

        // --- RENDERING ---
        function renderBoard(words) {
            boardArea.innerHTML = '';
            
            // Group words by length to display in neat rows if possible
            const lengthGroups = {};
            words.forEach(word => {
                if (!lengthGroups[word.length]) lengthGroups[word.length] = [];
                lengthGroups[word.length].push(word);
            });

            Object.keys(lengthGroups).forEach(length => {
                const row = document.createElement('div');
                row.className = 'flex flex-wrap justify-center gap-4 w-full';
                
                lengthGroups[length].forEach(word => {
                    const wordContainer = document.createElement('div');
                    wordContainer.className = 'flex gap-1 word-container';
                    wordContainer.dataset.word = word;

                    for (let i = 0; i < word.length; i++) {
                        const cell = document.createElement('div');
                        cell.className = 'w-9 h-9 sm:w-10 sm:h-10 bg-slate-800 rounded border border-slate-600 flex items-center justify-center font-bold text-xl word-cell shadow-sm';
                        wordContainer.appendChild(cell);
                    }
                    row.appendChild(wordContainer);
                });
                boardArea.appendChild(row);
            });
        }

        function renderLetters(letters) {
            // Remove existing letter nodes
            const existingNodes = interactionContainer.querySelectorAll('.letter-node');
            existingNodes.forEach(node => node.remove());

            letterNodes = [];
            
            letters.forEach((char, index) => {
                const node = document.createElement('div');
                node.className = 'letter-node absolute w-14 h-14 sm:w-16 sm:h-16 bg-slate-700 rounded-full flex items-center justify-center font-black text-2xl border-2 border-slate-600 cursor-pointer select-none';
                node.textContent = char;
                node.dataset.index = index;
                node.dataset.char = char;
                
                interactionContainer.appendChild(node);
                letterNodes.push(node);
            });
        }

        function handleResize() {
            // Update canvas resolution to match actual size
            const rect = interactionContainer.getBoundingClientRect();
            lineCanvas.width = rect.width;
            lineCanvas.height = rect.height;

            // Position letters in a circle
            positionLetters(rect.width, rect.height);
            drawLines(); // redraw if currently dragging
        }

        function positionLetters(containerWidth, containerHeight) {
            const centerX = containerWidth / 2;
            const centerY = containerHeight / 2;
            // Radius of the circle of letters
            // Using a dynamic radius based on container size, leaving padding for the nodes
            const nodeSize = letterNodes[0] ? letterNodes[0].offsetWidth : 64;
            const radius = (Math.min(containerWidth, containerHeight) / 2) - (nodeSize / 2) - 10;

            letterPositions = [];

            letterNodes.forEach((node, index) => {
                // Calculate angle for a circle. Start at top (-PI/2)
                const angle = (index / letterNodes.length) * 2 * Math.PI - (Math.PI / 2);
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);

                // Position DOM element via CSS (centering it on x,y)
                node.style.left = `${x - nodeSize / 2}px`;
                node.style.top = `${y - nodeSize / 2}px`;

                // Store center position for line drawing and hit detection
                letterPositions.push({ x, y, char: node.dataset.char, id: index });
            });
        }

        // --- INTERACTION LOGIC ---
        function getPointerPos(e) {
            const rect = interactionContainer.getBoundingClientRect();
            let clientX, clientY;

            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handlePointerDown(e) {
            if (e.target.id === 'shuffleBtn' || e.target.closest('#hintBtn')) return;
            
            isDragging = true;
            currentTouchPos = getPointerPos(e);
            checkIntersection(currentTouchPos);
        }

        function handlePointerMove(e) {
            if (!isDragging) return;
            // Prevent default scroll only while actively swiping on board
            if(e.cancelable) e.preventDefault(); 
            
            currentTouchPos = getPointerPos(e);
            checkIntersection(currentTouchPos);
            drawLines();
        }

        function handlePointerUp(e) {
            if (!isDragging) return;
            isDragging = false;
            
            processWord();
            
            // Reset state
            selectedIndices = [];
            letterNodes.forEach(node => node.classList.remove('active'));
            currentWordPreview.style.opacity = '0';
            
            drawLines(); // clear canvas
        }

        function checkIntersection(pos) {
            const hitRadius = 35; // slightly larger than visual radius for ease of use
            
            for (let i = 0; i < letterPositions.length; i++) {
                const l = letterPositions[i];
                const dx = pos.x - l.x;
                const dy = pos.y - l.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < hitRadius) {
                    // Check if node is already selected
                    const selectedIdx = selectedIndices.indexOf(i);
                    
                    if (selectedIdx === -1) {
                        // New node selected
                        selectedIndices.push(i);
                        letterNodes[i].classList.add('active');
                        vibrate(30);
                        updatePreview();
                    } else if (selectedIdx === selectedIndices.length - 2) {
                        // Backtracking: user dragged back to previous letter
                        const removedIdx = selectedIndices.pop();
                        letterNodes[removedIdx].classList.remove('active');
                        vibrate(20);
                        updatePreview();
                    }
                    break; // Only intersect one at a time
                }
            }
        }

        function updatePreview() {
            if (selectedIndices.length > 0) {
                const currentWord = selectedIndices.map(idx => letterPositions[idx].char).join('');
                currentWordPreview.textContent = currentWord;
                currentWordPreview.style.opacity = '1';
                
                // Optional: Scale effect on preview
                currentWordPreview.style.transform = 'scale(1.1)';
                setTimeout(() => currentWordPreview.style.transform = 'scale(1)', 100);
            } else {
                currentWordPreview.style.opacity = '0';
            }
        }

        // --- DRAWING ---
        function drawLines() {
            ctx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);

            if (selectedIndices.length === 0) return;

            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Neon teal effect
            ctx.strokeStyle = '#14b8a6'; // teal-500
            ctx.shadowColor = '#0d9488';
            ctx.shadowBlur = 10;

            ctx.beginPath();
            
            // Move to first point
            const firstPos = letterPositions[selectedIndices[0]];
            ctx.moveTo(firstPos.x, firstPos.y);

            // Draw lines to subsequent selected points
            for (let i = 1; i < selectedIndices.length; i++) {
                const pos = letterPositions[selectedIndices[i]];
                ctx.lineTo(pos.x, pos.y);
            }

            // Draw line to current finger/mouse position if still dragging
            if (isDragging) {
                ctx.lineTo(currentTouchPos.x, currentTouchPos.y);
            }

            ctx.stroke();
            
            // Reset shadow for next draw frame
            ctx.shadowBlur = 0;
        }

        // --- GAME LOGIC ---
        function processWord() {
            if (selectedIndices.length < 2) return;

            const word = selectedIndices.map(idx => letterPositions[idx].char).join('');
            const level = levels[currentLevelIndex % levels.length];

            if (level.words.includes(word)) {
                if (foundWords.includes(word)) {
                    showToast('Already Found!');
                    shakeInteractionContainer();
                } else {
                    // Valid new word
                    foundWords.push(word);
                    revealWordOnBoard(word);
                    vibrate([50, 50, 50]);
                    
                    checkLevelComplete();
                }
            } else {
                // Not a word in this level
                shakeInteractionContainer();
                vibrate(50);
            }
        }

        function revealWordOnBoard(word) {
            const containers = document.querySelectorAll('.word-container');
            let targetContainer = null;

            // Find the specific container for this word
            containers.forEach(c => {
                if (c.dataset.word === word) targetContainer = c;
            });

            if (targetContainer) {
                const cells = targetContainer.querySelectorAll('.word-cell');
                cells.forEach((cell, i) => {
                    cell.textContent = word[i];
                    cell.classList.remove('bg-slate-800', 'border-slate-600', 'hint');
                    cell.classList.add('found');
                });
            }
        }

        function shakeInteractionContainer() {
            interactionContainer.classList.add('animate-shake');
            setTimeout(() => {
                interactionContainer.classList.remove('animate-shake');
            }, 400);
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.style.opacity = '1';
            setTimeout(() => {
                toastEl.style.opacity = '0';
            }, 1500);
        }

        function updateCoins(amount) {
            coins += amount;
            coinsDisplay.textContent = coins;
            
            // Add a little pop effect to the coin display
            if (amount !== 0) {
                coinsDisplay.style.color = '#fcd34d'; // amber-300
                coinsDisplay.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    coinsDisplay.style.color = '';
                    coinsDisplay.style.transform = 'scale(1)';
                    coinsDisplay.style.transition = 'all 0.3s';
                }, 300);
            }
            saveState();
        }

        // --- FEATURES (SHUFFLE / HINT) ---
        shuffleBtn.addEventListener('click', () => {
            vibrate(30);
            // Shuffle the visual array of nodes
            const level = levels[currentLevelIndex % levels.length];
            const chars = [...level.letters];
            
            // Fisher-Yates shuffle
            for (let i = chars.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [chars[i], chars[j]] = [chars[j], chars[i]];
            }

            renderLetters(chars);
            handleResize();
            
            // Little spin animation
            interactionContainer.style.transition = 'transform 0.4s ease-in-out';
            interactionContainer.style.transform = 'rotate(180deg)';
            setTimeout(() => {
                interactionContainer.style.transition = 'none';
                interactionContainer.style.transform = 'rotate(0deg)';
            }, 400);
        });

        hintBtn.addEventListener('click', () => {
            if (coins < 25) {
                showToast("Not enough coins!");
                return;
            }

            const level = levels[currentLevelIndex % levels.length];
            
            // Find a word that hasn't been completely found yet
            const unfoundWords = level.words.filter(w => !foundWords.includes(w));
            if (unfoundWords.length === 0) return;

            // Pick a random unfound word
            const targetWord = unfoundWords[Math.floor(Math.random() * unfoundWords.length)];
            
            // Initialize hint tracker for this word if not exists
            if (!hintsRevealed[targetWord]) hintsRevealed[targetWord] = [];

            // Find unrevealed indices in this word
            const unrevealedIndices = [];
            for (let i = 0; i < targetWord.length; i++) {
                if (!hintsRevealed[targetWord].includes(i)) {
                    unrevealedIndices.push(i);
                }
            }

            if (unrevealedIndices.length > 0) {
                updateCoins(-25);
                vibrate(30);

                // Reveal one random letter
                const idxToReveal = unrevealedIndices[0]; // Just reveal sequentially for simplicity
                hintsRevealed[targetWord].push(idxToReveal);

                // Update DOM
                const containers = document.querySelectorAll('.word-container');
                let targetContainer = null;
                containers.forEach(c => {
                    if (c.dataset.word === targetWord) targetContainer = c;
                });

                if (targetContainer) {
                    const cell = targetContainer.querySelectorAll('.word-cell')[idxToReveal];
                    cell.textContent = targetWord[idxToReveal];
                    cell.classList.add('hint');
                    
                    // Pop animation
                    cell.classList.add('animate-pop');
                    setTimeout(() => cell.classList.remove('animate-pop'), 400);
                }
            }
        });

        // --- LEVEL COMPLETION ---
        function checkLevelComplete() {
            const level = levels[currentLevelIndex % levels.length];
            if (foundWords.length === level.words.length) {
                setTimeout(() => {
                    showLevelCompleteModal();
                }, 800);
            }
        }

        function showLevelCompleteModal() {
            updateCoins(20);
            levelCompleteModal.classList.remove('hidden');
            levelCompleteModal.classList.add('flex');
            fireConfetti();
        }

        nextLevelBtn.addEventListener('click', () => {
            levelCompleteModal.classList.add('hidden');
            levelCompleteModal.classList.remove('flex');
            currentLevelIndex++;
            saveState();
            loadLevel(currentLevelIndex);
        });

        // --- UTILS ---
        function vibrate(pattern) {
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        // --- CONFETTI (Simple Canvas implementation) ---
        const confettiCanvas = document.getElementById('confettiCanvas');
        const cCtx = confettiCanvas.getContext('2d');
        let particles = [];

        function fireConfetti() {
            confettiCanvas.classList.remove('hidden');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            particles = [];
            const colors = ['#14b8a6', '#f59e0b', '#ef4444', '#3b82f6', '#10b981'];

            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: confettiCanvas.width / 2,
                    y: confettiCanvas.height / 2 + 100,
                    r: Math.random() * 6 + 2,
                    dx: Math.random() * 10 - 5,
                    dy: Math.random() * -10 - 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.floor(Math.random() * 10) - 10,
                    tiltAngleInc: (Math.random() * 0.07) + 0.05,
                    tiltAngle: 0
                });
            }

            requestAnimationFrame(renderConfetti);
        }

        function renderConfetti() {
            if (levelCompleteModal.classList.contains('hidden')) {
                confettiCanvas.classList.add('hidden');
                return;
            }

            cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            let active = false;

            particles.forEach(p => {
                p.tiltAngle += p.tiltAngleInc;
                p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle) * 2;
                p.dy += 0.1; // gravity
                p.y += p.dy;
                p.x += p.dx;

                if (p.y <= confettiCanvas.height) active = true;

                cCtx.beginPath();
                cCtx.lineWidth = p.r;
                cCtx.strokeStyle = p.color;
                cCtx.moveTo(p.x + p.tilt + p.r, p.y);
                cCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                cCtx.stroke();
            });

            if (active) requestAnimationFrame(renderConfetti);
        }

        // --- EVENT LISTENERS BINDING ---
        // Mouse Events
        interactionContainer.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        // Touch Events
        interactionContainer.addEventListener('touchstart', handlePointerDown, {passive: false});
        window.addEventListener('touchmove', handlePointerMove, {passive: false});
        window.addEventListener('touchend', handlePointerUp);
        window.addEventListener('touchcancel', handlePointerUp);

        // START
        initGame();

    </script>
